backend:
  name: git-gateway
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "menu"
    label: "Menu Items"
    folder: "data"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - { label: "ID", name: "id", widget: "string" }
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Category", name: "category", widget: "select", options: ["Rice", "Soups", "Grills", "Sides", "Drinks"] }
      - { label: "Price", name: "price", widget: "number" }
      - { label: "Stock", name: "stock", widget: "number", default: 10 }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Image", name: "image", widget: "image" }

  - name: "settings"
    label: "Brand Settings"
    delete: false
    editor:
      preview: false
    files:
      - name: "site"
        label: "Site Settings"
        file: "data/site.json"
        fields:
          - {label: "Logo", name: "logo", widget: "image"}
          - {label: "Business Name", name: "brandName", widget: "string"}
          - {label: "Primary Color", name: "primaryColor", widget: "color"}
          - {label: "Accent Color", name: "accentColor", widget: "color"}
          - {label: "Hero Title", name: "heroTitle", widget: "string"}
          - {label: "Hero Subtitle", name: "heroSubtitle", widget: "text"}
          - {label: "Hero Slider Images", name: "heroImages", widget: "list", field: {label: Image, name: image, widget: image}}
          - {label: "WhatsApp Number", name: "whatsappNumber", widget: "string"}
          - {label: "Instagram URL", name: "instagram", widget: "string", required: false}
          - {label: "Facebook URL", name: "facebook", widget: "string", required: false}
          - {label: "Twitter URL", name: "twitter", widget: "string", required: false}
          - {label: "TikTok URL", name: "tiktok", widget: "string", required: false}
          - {label: "About Title", name: "aboutTitle", widget: "string"}
          - {label: "About Text", name: "aboutText", widget: "text"}
          - {label: "About Image", name: "aboutImage", widget: "image"}
          - {label: "Address", name: "address", widget: "string"}
          - {label: "Delivery Mode", name: "deliveryMode", widget: "select", options: [{label: "Flat Fee", value: "flat"}, {label: "Free", value: "free"}, {label: "Custom Rules", value: "custom"}]}
          - {label: "Flat Delivery Fee (₦)", name: "deliveryFlatFee", widget: "number"}
          - {label: "Free Delivery Above (₦)", name: "deliveryFreeThreshold", widget: "number"}
          - {label: "Custom Delivery Rules", name: "deliveryCustomText", widget: "text"}
          - {label: "Delivery Areas", name: "deliveryAreas", widget: "string"}
