backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "settings"
    label: "Site Settings"
    files:
      - file: "data/site.json"
        label: "Site Settings"
        name: "settings"
        fields:
          - {label: "Business Name", name: "businessName", widget: "string"}
          - {label: "Brand Name", name: "brandName", widget: "string"}
          - {label: "Primary Color", name: "primaryColor", widget: "color"}
          - {label: "Accent Color", name: "accentColor", widget: "color"}
          - {label: "Logo", name: "logo", widget: "image", required: false}
          - {label: "WhatsApp Number", name: "whatsappNumber", widget: "string", hint: "2348012345678"}
          - {label: "Phone", name: "phone", widget: "string"}
          - {label: "Paystack Public Key", name: "paystackPublicKey", widget: "string"}
          - {label: "Formspree Endpoint", name: "formspreeEndpoint", widget: "string"}
          - {label: "Instagram URL", name: "instagram", widget: "string", required: false}
          - {label: "Facebook URL", name: "facebook", widget: "string", required: false}
          - {label: "Twitter URL", name: "twitter", widget: "string", required: false}
          - {label: "TikTok URL", name: "tiktok", widget: "string", required: false}
          - {label: "Address", name: "address", widget: "string"}
          - {label: "Hero Title", name: "heroTitle", widget: "string"}
          - {label: "Hero Subtitle", name: "heroSubtitle", widget: "text"}
          - {label: "Hero Images", name: "heroImages", widget: "list", field: {label: Image, name: image, widget: image}}
          - {label: "Show Catering Section", name: "cateringEnabled", widget: "boolean", default: true}
          - {label: "Catering Title", name: "cateringTitle", widget: "string"}
          - {label: "Catering Text", name: "cateringText", widget: "text"}
          - {label: "Catering Image", name: "cateringImage", widget: "image"}
          - {label: "Catering Button Text", name: "cateringButtonText", widget: "string"}
          - {label: "Catering Button Link", name: "cateringButtonLink", widget: "string"}
          - {label: "Delivery Mode", name: "deliveryMode", widget: "select", options: ["flat", "free", "custom"]}
          - {label: "Flat Delivery Fee", name: "deliveryFlatFee", widget: "number", condition: {field: "deliveryMode", value: "flat"}}
          - {label: "Free Delivery Threshold", name: "deliveryFreeThreshold", widget: "number", condition: {field: "deliveryMode", value: "flat"}}
          - {label: "Custom Delivery Text", name: "deliveryCustomText", widget: "text", condition: {field: "deliveryMode", value: "custom"}}
          - {label: "Delivery Areas", name: "deliveryAreas", widget: "string", hint: "Comma separated list of areas"}
          - {label: "About Title", name: "aboutTitle", widget: "string"}
          - {label: "About Text", name: "aboutText", widget: "text"}
          - {label: "About Image", name: "aboutImage", widget: "image"}
          - label: "Delivery Zones"
            name: "deliveryZones"
            widget: "list"
            fields:
              - {label: "Area Name", name: "name", widget: "string"}
              - {label: "Fee", name: "fee", widget: "number"}

  - name: "menu"
    label: "Menu Items"
    folder: "data/menu"
    extension: "json"
    create: true
    slug: "{{fields.name}}"
    fields:
      - {label: "Food Name", name: "name", widget: "string"}
      - {label: "Price", name: "price", widget: "number"}
      - {label: "Category", name: "category", widget: "select", options: ["Rice", "Swallow", "Soups", "Grills", "Drinks", "Small Chops"]}
      - {label: "In Stock", name: "inStock", widget: "boolean", default: true}
      - {label: "Food Image", name: "image", widget: "image"}
      - {label: "Description", name: "description", widget: "text", required: false}
